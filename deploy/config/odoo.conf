[options]
; =============================================================================
; Odoo — Configuración base para NKR (usada por Nkrfile.odoo / Nkrfile.odoo19)
; =============================================================================
; Variables dinámicas (inyectadas por NKR vía environment):
;   $DB_HOST, $DB_PORT, $DB_USER, $DB_PASSWORD, $DB_NAME
;
; El panel sobreescribe campos vía /api/v1/instances (workers, memory, etc.)
; =============================================================================

addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons,/mnt/extra-enterprise
data_dir = /var/lib/odoo

db_host = 127.0.0.1
db_port = 6432
db_user = odoo
db_password = odoo
admin_passwd = admin

db_maxconn = 64
db_name = False
db_template = template1
dbfilter = .*
list_db = False
db_prepared_statements = False

log_handler = [':INFO']
log_level = info
logfile = None

max_cron_threads = 1
workers = 2
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_time_cpu = 60
limit_time_real = 120

xmlrpc = True
xmlrpc_interface =
xmlrpc_port = 8069
gevent_port = 8072

csv_internal_sep = ,

proxy_mode = True

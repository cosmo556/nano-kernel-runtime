[options]
; =============================================================================
; Odoo 17 — Configuración para NKR
; =============================================================================
; Este archivo se inyecta en la VM vía --volume antes del boot.
; Edítalo libremente. Los cambios aplican al siguiente arranque.
;
; Modo Cell (Stateless Worker):
;   db_host apunta al PgBouncer de la célula (10.0.X.4:6432)
;   addons_path incluye /opt/odoo/extra-addons (VirtIO-FS Slot 1)
;   data_dir en /var/lib/odoo (VirtIO-FS Slot 2, RW)
;
; Modo Legacy (disco ext4 directo):
;   db_host apunta al PG directo (10.0.0.2:5432)
;
; Tras editar: sudo nkr compose down && sudo nkr compose up -d
; =============================================================================

addons_path = /usr/lib/python3/dist-packages/odoo/addons,/opt/odoo/extra-addons,/mnt/extra-addons
data_dir = /var/lib/odoo

; ── Base de datos ──
; Cell mode: PgBouncer en 10.0.0.4:6432
; Legacy:    PostgreSQL en 10.0.0.2:5432
db_host = 10.0.0.4
db_port = 6432
db_user = odoo
db_password = odoo
admin_passwd = admin

; ── Filtros DB ──
db_maxconn = 64
db_name = False
db_template = template1
dbfilter = .*
list_db = True

; ── Logs ──
log_handler = [':INFO']
log_level = info
logfile = None

; ── Performance ──
max_cron_threads = 2
workers = 0
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_time_cpu = 60
limit_time_real = 120

; ── HTTP ──
xmlrpc = True
xmlrpc_interface =
xmlrpc_port = 8069

csv_internal_sep = ,

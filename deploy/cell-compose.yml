# =============================================================================
# NKR Compose — Plantilla Célula Odoo (Worker Stateless)
# =============================================================================
#
# Arquitectura de Célula:
#   ┌─────────────────────────────────────────────────────────────┐
#   │ Célula                                                      │
#   │                                                             │
#   │  ┌──────────┐   ┌───────────┐   ┌────────────────────────┐ │
#   │  │ PostgreSQL│──▶│ PgBouncer │──▶│ Odoo (Stateless)       │ │
#   │  │ 10.0.X.2 │   │ 10.0.X.4  │   │ 10.0.X.5              │ │
#   │  │ 512MB/1c  │   │ 128MB/1c  │   │ 512MB/1c              │ │
#   │  └──────────┘   └───────────┘   │                        │ │
#   │       │                          │ Slot 0: / (RO+DAX)    │ │
#   │       │                          │ Slot 1: addons (RO)   │ │
#   │       │                          │ Slot 2: filestore (RW)│ │
#   │       │                          └────────────────────────┘ │
#   │       ▼                                                     │
#   │  /mnt/nkr/cells/CELL/pg/                                   │
#   └─────────────────────────────────────────────────────────────┘
#
# Slots VirtIO-FS del Odoo Worker:
#   Slot 0 (rootfs): /mnt/nkr/master/rootfs → / (ReadOnly + DAX)
#     - Binarios Python, dependencias de sistema, Core de Odoo
#     - Compartido entre TODAS las células (1 copia en page cache)
#
#   Slot 1 (shares): /mnt/nkr/cells/<cell>/addons → /opt/odoo/extra-addons (RO)
#     - Repositorio Git del cliente con módulos custom
#
#   Slot 2 (shares): /mnt/nkr/cells/<cell>/files → /var/lib/odoo (RW)
#     - Imágenes, sesiones, documentos PDF (adjuntos)
#
# Red (Aislamiento L2):
#   - Cada VM obtiene TAP en bridge nkr0
#   - IP interna: 10.0.0.<vm_id+1>/24
#   - Filtros BPF por TAP impiden sniffing entre células
#
# Preparar:
#   sudo ./deploy/cell-setup.sh C1 erp.cliente1.com
#   cd /mnt/nkr/cells/C1 && sudo nkr compose up -d
#
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL — Almacén de datos de la célula
  # ---------------------------------------------------------------------------
  db:
    id: 1
    disks:
      - /mnt/nkr/images/postgres.ext4
    ram: 512
    chrs: 1
    nvm_name: "C1-db"
    shares:
      - "/mnt/nkr/cells/C1/pg:/var/lib/postgresql/data"
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
      POSTGRES_DB: postgres
    healthcheck:
      port: 5432
      initial_delay: 10
      interval: 5
      retries: 24

  # ---------------------------------------------------------------------------
  # PgBouncer — Connection pooler (transaction mode)
  # ---------------------------------------------------------------------------
  pgbouncer:
    id: 3
    disks:
      - /mnt/nkr/images/pgbouncer.ext4
    ram: 128
    chrs: 1
    burst: false
    nvm_name: "C1-pgb"
    environment:
      PG_HOST: "10.0.0.2"
      PG_PORT: "5432"
      PG_USER: odoo
      PG_PASSWORD: odoo
      POOL_MODE: transaction
      POOL_SIZE: "20"
      MAX_CLIENT_CONN: "400"
    healthcheck:
      port: 6432
      initial_delay: 15
      interval: 5
      retries: 20

  # ---------------------------------------------------------------------------
  # Odoo — Worker Stateless
  # ---------------------------------------------------------------------------
  odoo:
    id: 4
    rootfs: "/mnt/nkr/master/rootfs"
    ram: 512
    chrs: 1
    nvm_name: "C1-odoo"
    shares:
      - "/mnt/nkr/cells/C1/addons:/mnt/extra-addons:ro"
      - "/mnt/nkr/cells/C1/files:/var/lib/odoo:rw"
    volumes:
      - "/mnt/nkr/cells/C1/config/odoo.conf:/etc/odoo/odoo.conf"
    environment:
      DB_HOST: "10.0.0.4"
      DB_PORT: "6432"
      DB_NAME: "False"
      DB_USER: odoo
      DB_PASSWORD: odoo
    healthcheck:
      port: 8069
      initial_delay: 20
      interval: 5
      retries: 30

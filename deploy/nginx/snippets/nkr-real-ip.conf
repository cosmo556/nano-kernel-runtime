# NKR — Cloudflare real-IP rewriting.
#
# Permite que NKR funcione transparente en dos modos de edge sin cambios
# runtime:
#
#   (1) CLOUDFLARE PROXIED (orange cloud): tráfico llega de IPs de CF.
#       Nginx detecta esos IPs (lista declarada acá), reescribe $remote_addr
#       al header CF-Connecting-IP (la IP real del cliente final), y todos
#       los rate-limits, access logs y reglas IP-based usan la IP correcta.
#
#   (2) DIRECT (DNS-only / gray cloud): tráfico llega del cliente directo.
#       Sus IPs no están en la lista CF, así que nginx mantiene $remote_addr
#       como el IP conectado (que ya es el real). El comportamiento es
#       idéntico al de un setup sin CF.
#
# El switch entre modos se hace flipando `proxied: true|false` en el DNS
# record de Cloudflare (vía CF API desde el panel — NKR no participa).
# Propagación: 1-5 min. Sin reload de nginx ni cambios en el host.
#
# IPs canónicos de Cloudflare (regenerar con: curl https://www.cloudflare.com/ips-v4
# y .../ips-v6). CF actualiza esto raramente (~1 cambio/año). Si agregan un
# rango nuevo, regenerar el snippet y reload.
#
# Seguridad: si un IP que NO está en la lista intenta mandar header
# CF-Connecting-IP (spoof), nginx lo ignora y mantiene $remote_addr real
# del conector. set_real_ip_from delimita en quién confiar.

# Cloudflare IPv4 (https://www.cloudflare.com/ips-v4/)
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;

# Cloudflare IPv6 (https://www.cloudflare.com/ips-v6/)
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;

# CF-Connecting-IP es el header canónico de CF (preferido sobre
# X-Forwarded-For: lleva sólo la IP del cliente final, no una cadena).
real_ip_header CF-Connecting-IP;
# real_ip_recursive: si llegan múltiples IPs en el header (lista), saltar
# las que están en `set_real_ip_from` y quedarse con la primera externa.
# Defensivo contra clients que mandan headers CF-Connecting-IP custom.
real_ip_recursive on;

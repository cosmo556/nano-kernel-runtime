# NKR hardening — incluido por cada vhost de tenant Odoo.
#
# (1) Bloqueo de extensiones legacy + dotfiles → 444 (TCP close sin respuesta)
# (2) Bloqueo de paths típicos de scanners / vulnerability sweepers → 444
# (3) Rate limit /web/login y /web/database/* — vive en cada archivo per-tenant
#     porque necesita el upstream específico (proxy_pass http://up_<tenant>).
#
# 444 es preferible a 403/404 porque no confirma que el server existe
# (anti-fingerprinting) y no consume bandwidth para escribir un response.
#
# Funciona porque Cloudflare NO está proxied (DNS-only): $binary_remote_addr
# es la IP real del atacante y el rate limit es per-attacker, no per-edge.

# ─── (1) Extensiones legacy en suffix ───────────────────────────────────────
location ~* \.(php|env|sql|bak|yml|tar|gz|zip|asp|aspx|jsp|cgi|axd|action)$ {
    return 444;
}

# ─── (1b) Variantes de backup + path-info de .php ───────────────────────────
# Captura .php seguido de (.|/|~) — cubre escaneos típicos:
#   /phpinfo.php.old   /phpinfo.php~   /phpinfo.php.save   /phpinfo.php.bak
#   /webroot/index.php/_environment   (path-info exploit estilo CodeIgniter)
#   /foo.php/bar       /foo.php.swp   /foo.php.orig
location ~* \.php([./~]|\.(old|save|bak|swp|orig|copy|tmp|inc|new))(/|$) {
    return 444;
}

# ─── (1c) PHP recon paths sin extensión + framework debug endpoints ─────────
# /phpinfo, /info.php, /_profiler/phpinfo, /_environment (Symfony debug),
# /_wdt (Symfony web-debug-toolbar), /webroot/ (CMS/CodeIgniter app dir).
# Ningún cliente legítimo de Odoo pega estos paths.
location ~* (^|/)(phpinfo|_profiler|_environment|_wdt)(/|$) {
    return 444;
}
location ~* ^/webroot(/|$) {
    return 444;
}

# Hidden dotfiles (.htaccess, .htpasswd, .DS_Store, .git, .svn, .vscode, etc.)
# EXCEPCIÓN: /.well-known/ legítimo (Let's Encrypt ACME, security.txt RFC 9116).
location ~* /\.(?!well-known/) {
    return 444;
}

# ─── (2) Paths de scanners conocidos ────────────────────────────────────────
# Cada categoría es una alternation regex separada por mantenimiento. Si en el
# futuro algún addon Odoo legítimo usa uno de estos paths (improbable), basta
# editarlo acá. Categorías:
#
#   - WordPress: estructuras y APIs típicas
#   - DB admin GUIs (phpMyAdmin, Adminer, etc.)
#   - Java / Spring / Confluence / Atlassian
#   - APIs GraphQL / REST que Odoo no expone
#   - Swagger / OpenAPI doc paths
#   - Microsoft Exchange / IIS exploits
#   - .NET / Vite dev / debug toolkits
#   - Genéricos: server-status, telescope, HNAP, etc.

# WordPress + .DS_Store readers (incluye paths con prefix arbitrario tipo
# /blog/wp-includes/, /shop/wp-config.php, /2018/wp-admin/...)
location ~* /(wp-admin|wp-login|wp-includes|wp-content|wp-config|wp-json|wlwmanifest|readme\.html|xmlrpc) {
    return 444;
}

# DB admin GUIs
location ~* /(MyAdmin|phpmyadmin|pma|adminer|dbadmin|mysqladmin|websql|sqladmin) {
    return 444;
}

# Java / Spring / Atlassian / Tomcat
location ~* /(WEB-INF|META-INF|actuator|console|manager/html|host-manager|login\.action|webjars) {
    return 444;
}

# APIs que Odoo no expone (Odoo usa /web/dataset/ y /jsonrpc, NO /api ni /graphql).
# Cubre tanto raíces (/api, /api/) como versionado REST (/api/v1/users, /api/v2/...).
# OJO: si algún tenant instala addons OCA tipo `base_rest`, `rest_log`, `auth_api_key`
# (que SÍ exponen /api/v1/*), hay que comentar la primera regla y caer al bloqueo
# granular legacy. Detección: tail del log; si ves /api/v1/legítimos en 444, sabemos.
location ~* ^/api(/|$) {
    return 444;
}
location ~* ^/(api-docs|graphql(/|$)|gql(/|$)) {
    return 444;
}

# Swagger / OpenAPI doc paths
location ~* /(swagger|swagger-ui|swagger\.json|api-docs/swagger|v2/api-docs|v3/api-docs) {
    return 444;
}

# Microsoft Exchange / OWA / IIS
location ~* /(ecp/Current|owa/auth|aspnet_client|EWS/Exchange|autodiscover\.xml) {
    return 444;
}

# Genéricos: scanner sweep targets
location ~* /(server-status|server-info|HNAP1|trace\.axd|telescope|debug/default|@vite|cgi-bin|_vti_|v2/_catalog|config\.json$|drupal|joomla|magento_version|typo3|graphiql|openapi\.json) {
    return 444;
}

# Cloud / DevOps secrets leak attempts (Dockerfile, IaC files, credentials)
location ~* /(firebase-debug\.log|Dockerfile|docker-compose\.ya?ml|serverless\.ya?ml|Procfile|aws/credentials|\.aws/credentials|secrets\.ya?ml|terraform\.tfstate) {
    return 444;
}

# Elasticsearch / Kibana / OpenSearch
location ~* /(app/kibana|_cat/|_cluster/|_nodes/|_search\?|_aliases|/api/searchguard) {
    return 444;
}

# OIDC / OAuth probing (Odoo no usa OIDC; cualquier hit es scan)
location = /.well-known/openid-configuration {
    return 444;
}
location ~* /\.well-known/(jwks|oauth-authorization-server|openid-) {
    return 444;
}

# Path traversal / encoding tricks (atacantes intentan URL-encode partes
# para evadir filtros — bloquear chars sospechosos en partes que Odoo no usa).
# OJO: las alternativas NO llevan `/` inicial (el wrap exterior `/(...)` ya
# aporta el slash; doble slash en el path nunca aparece en URIs normalizadas).
location ~* /(login%3F|web%2F|odoo%3F|web/%23|web/https) {
    return 444;
}

# Recon genérico sin extensión (cPanel/WHM/Plesk/server-info/about). Ningún
# path legítimo de Odoo empieza con estos prefijos. `($|/)` evita falsos
# positivos sobre rutas Odoo que casualmente contengan estas palabras
# en medio.
location ~* ^/(___proxy_subdomain_|server($|/)|about($|/)|cpanel($|/)|whm($|/)|plesk($|/)) {
    return 444;
}

# WordPress REST scanners (query-string-based, no se atrapan por path solo).
# Usa map al final del archivo para el flag $is_wp_rest_scan.
if ($is_wp_rest_scan) { return 444; }
# (Para que `if` funcione, el `map` debe estar definido en `http {}`. Lo
# agregamos al nginx.conf del nivel http, abajo.)

# NKR — fail2ban jail para scanners.
#
# - bantime    24h primer ban
# - findtime   10 min: ventana para acumular hits
# - maxretry   5: 5 hits sospechosos en 10 min → ban
# - banaction  iptables-multiport: bloquea TODOS los puertos del host (no solo 80/443)
#              para que el atacante quede silenciado a nivel TCP

[nkr-nginx]
enabled  = true
filter   = nkr-nginx
logpath  = /var/log/nginx/access.log
maxretry = 5
findtime = 600
bantime  = 86400
banaction = iptables-multiport
port     = http,https,8069,8072

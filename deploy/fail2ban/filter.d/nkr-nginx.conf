# Fail2ban filter — NKR nginx hardening.
#
# Matchea hits que el snippet nkr-hardening.conf bloquea (444 + 429), más
# requests obvios de scanner que llegaron al backend con 404 (paths que NKR
# no bloquea pero que ningún cliente legítimo pediría: /server, /about,
# /firebase-debug.log, etc).
#
# Failregex devuelve la IP. fail2ban usa esa IP para banear vía iptables.

[Definition]

# Patrones de scan obvios que pasaron al backend (Odoo dió 404). Muchos hits
# acumulados de la misma IP hacia distintos paths sospechosos = scanner.
failregex = ^<HOST> .* "(GET|POST|HEAD|OPTIONS) (/server|/about|/console/|/login\.action|/v2/_catalog|/server-status|/firebase-debug\.log|/Dockerfile|/serverless\.ya?ml|/Procfile|/aws/credentials|/api/v1/config|/graphiql|/openapi\.json|/app/kibana|/_cat/|/swagger|/wp-|/xmlrpc|/wlwmanifest|/MyAdmin|/phpmyadmin|/adminer|/WEB-INF|/META-INF|/actuator|/manager/html|/HNAP1|/trace\.axd|/telescope|/@vite|/cgi-bin|/ecp/Current|/owa/auth|/aspnet_client|/EWS/Exchange|/autodiscover\.xml).*?" (444|404|429)
            ^<HOST> .* "(GET|POST|HEAD|OPTIONS) [^"]+\.(php|env|sql|bak|asp|aspx|jsp|cgi|axd|action) HTTP[^"]*" (444|404|429)
            ^<HOST> .* "(GET|POST|HEAD|OPTIONS) [^"]*\?rest_route=[^"]*" (444|404|429)
            ^<HOST> .* "(GET|POST|HEAD|OPTIONS) [^"]*(/phpinfo|/info\.php|/_profiler|/_environment|/_wdt|/webroot/)[^"]*" (444|404|429)
            ^<HOST> .* "(GET|POST|HEAD|OPTIONS) [^"]*\.php([./~]|\.(old|save|bak|swp|orig|copy|tmp|inc|new))[^"]*" (444|404|429)

ignoreregex =

# datepattern: el formato de timestamp de nginx access.log
datepattern = \[%%d/%%b/%%Y:%%H:%%M:%%S %%z\]
